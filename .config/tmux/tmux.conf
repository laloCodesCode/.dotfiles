# Options
set -sg terminal-overrides ",*:RGB"  # true color support
set -g escape-time 0                 # no delay after escape (important for Neovim)
set -g mouse on
set -g renumber-windows on           # keep window numbers sequential after closing
set -g mode-keys vi                  # vim keys 
set -g set-clipboard on              # copy to clipboard
set -g repeat-time 1000              # 1s window to repeat prefix-bound keys
# Options: start indexes from 1
set -g base-index 1
set -g pane-base-index 1
# Change prefix
unbind C-b
set -g prefix `
bind ` send-prefix                   # press `` to send a literal backtick
# Theme: borders
set -g pane-border-lines simple
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta
# Theme: status
set -g status-style bg=default,fg=black,bright
set -g status-left ""
set -g status-right "#[fg=black,bright]#S"
# Theme: status (windows)
set -g window-status-format "●"
set -g window-status-current-format "●"
set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta\#,nobold}"
set -g window-status-bell-style "fg=red,nobold"
# Keybindings: wasd
bind w select-pane -U
bind a select-pane -L
bind s select-pane -D
bind d select-pane -R
bind -r W resize-pane -U
bind -r A resize-pane -L
bind -r S resize-pane -D
bind -r D resize-pane -R
# Keybindings: disable repeat for arrows
bind Up select-pane -U
bind Left select-pane -L
bind Down select-pane -D
bind Right select-pane -R
# Keybindings: split
bind h split-window -h
bind | split-window -h
bind v split-window -v
bind - split-window -v
# Keybindings: windows
# C-Tab and C-S-Tab are intercepted by macOS — replaced with C-n / C-p
bind -n C-n next-window
bind -n C-p previous-window
bind -n M-1 select-window -t :1     # requires macos-option-as-alt = true in Ghostty
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
# Keybindings: other
bind f resize-pane -Z
bind q detach-client
bind e choose-window -Z
bind -n M-w select-pane -U          # requires macos-option-as-alt = true in Ghostty
bind -n M-a select-pane -L
bind -n M-s select-pane -D
bind -n M-d select-pane -R
bind -n M-f resize-pane -Z

#copy and paste
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
